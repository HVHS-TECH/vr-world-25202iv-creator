<!DOCTYPE html>
<html>
  <head>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
    
  </head>
    <body>
    <a-scene>
      <a-sky color="grey"></a-sky>
     <a-entity
     ply-model="src:smoka.ply"
           position="0 9.5 -12"
           rotation="270 0 0"
    "      animation__first="
           property: position;
           from:0 1.5 -12;
           to:0 1.5 -12;
           startEvents: animationcomplete_second
    "
    ></a-entity>
      
       <!-- Put this inside the <a-scene> -->
        <a-entity  
            ply-model="src:Lava.ply"
     position="13.3 -3.5 -12"
     rotation="270 0 0"
      ></a-entity>
     <a-entity
     ply-model="src:Crass.ply"
     position="-0.5 -3.5 -12"
     rotation="270 0 0"
     ></a-entity>
     <a-entity
     ply-model="src:smoka.ply"
     position="-1.5 4.5 -12"
     rotation="270 0 0"
     animation__second="
     property: position;
     from: -1.5 -10.5 -12; 
     to: -1.5 15.5 -12;
     dur: 10000;
     startEvents: loaded, animationcomplete_first
     "
     ></a-entity>
     






  </a-scene>
  </body>
</html>
